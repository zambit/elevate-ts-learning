name: CI
on: [push, pull_request]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: latest
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install
      - run: pnpm -C example-elevate-ts-todo test && pnpm -C example-elevate-ts-todo build
      - run: pnpm -C example-effect-ts-todo test && pnpm -C example-effect-ts-todo build
      - run: pnpm -C example-purify-ts-todo test && pnpm -C example-purify-ts-todo build
